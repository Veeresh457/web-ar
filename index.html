<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Image Scanner</title>
</head>
<body>
  <h2>Image Scanner → YouTube</h2>

  <label>Upload Image: <input type="file" id="file" accept="image/*"/></label>
  <br><br>

  <button onclick="scan()">Scan & Open YouTube</button>
  <br><br>

  <div id="status"></div>
  <div id="result"></div>

  <script>
    const API_KEY = "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"; // Replace with your actual Anthropic key

    async function scan() {
      const file = document.getElementById('file').files[0];
      const status = document.getElementById('status');
      const result = document.getElementById('result');

      result.innerHTML = '';

      if (!file) { status.innerText = 'Please select an image.'; return; }

      status.innerText = 'Reading image...';

      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

      status.innerText = 'Analyzing image with Claude...';

      let parsed;
      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': API_KEY,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-calls': 'true'
          },
          body: JSON.stringify({
            model: 'claude-opus-4-6',
            max_tokens: 512,
            messages: [{
              role: 'user',
              content: [
                {
                  type: 'image',
                  source: { type: 'base64', media_type: file.type || 'image/jpeg', data: base64 }
                },
                {
                  type: 'text',
                  text: 'Look at this image and identify exactly what it is (product, movie, book, album, person, place, etc.). Then give me the single best YouTube search query to find the most relevant video about it. Reply ONLY with valid JSON, no markdown: {"what": "brief description of what you see", "youtube_query": "the best YouTube search query for this"}'
                }
              ]
            }]
          })
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err?.error?.message || 'API error ' + response.status);
        }

        const data = await response.json();
        const text = data.content[0].text.trim().replace(/```json|```/g, '').trim();
        parsed = JSON.parse(text);
      } catch (e) {
        status.innerText = 'Error: ' + e.message;
        return;
      }

      status.innerText = 'Done! Opening YouTube...';

      const youtubeUrl = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(parsed.youtube_query);

      result.innerHTML =
        '<p><b>Identified:</b> ' + parsed.what + '</p>' +
        '<p><b>Searching:</b> ' + parsed.youtube_query + '</p>' +
        '<p><a href="' + youtubeUrl + '" target="_blank">Click here if YouTube did not open</a></p>';

      window.open(youtubeUrl, '_blank');
    }
  </script>
</body>
</html>
